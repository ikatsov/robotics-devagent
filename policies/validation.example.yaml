# Rollout validation: set ``task`` to the **exact stem** of the paired task bundle next to this config:
#   ``policies/impl/<task>/<task>.yaml``  (``task_spec`` + ``task_analyzers``)
#   ``policies/impl/<task>/<task>.py``   (policy for ``simulate_policy.py`` — required; same stem as ``task``)
# Task-specific analyzer modules: ``policies/impl/<task>/<analyzer_type>.py`` with ``def build(params)``.
# Generic analyzers use ``analyzers_head`` / ``analyzers_tail``; task-specific blocks come only from the task YAML.
#
# Paths: ``base_dir`` is joined with this file's directory (``policies/`` + ``..`` → repo root).
# When ``task:`` is set, rollout paths use ``<base_dir>/artifacts/<task>/`` (e.g. ``../artifacts/base_rotation/``).
# Generate rollouts with ``scripts/simulate_policy.py`` (defaults in ``policies/simulate_policy.example.yaml``;
# set ``run_dir`` there to ``artifacts/<task>`` to match this file). Override paths only if needed via ``simulation.*``.
#
# Run:  python scripts/validate_rollout.py --config policies/validation.example.yaml
#
# Analyzers (reference):
#   - ``artifact_manifest``, ``joints_csv_trajectory``, ``vlm_observer`` (generic; in head/tail here)
#   - Task rubric analyzers listed under ``task_analyzers`` in ``policies/impl/<task>/<task>.yaml``

version: 1
base_dir: ..

# Must match ``policies/impl/<task>/<task>.yaml`` and ``policies/impl/<task>/<task>.py`` exactly (stem only).
task: base_rotation

analyzers_head:
  - type: artifact_manifest
    enabled: true
    params:
      output_name: validation_manifest.json

  - type: joints_csv_trajectory
    enabled: true
    params:
      no_json_file: false

analyzers_tail:
  - type: vlm_observer
    enabled: true
    params:
      mode: video
      model: gemini-3.5-flash
      max_duration_seconds: 45
      max_frames: 10
      inline_video_max_mb: 19
      no_json_file: false
      json_out: null
